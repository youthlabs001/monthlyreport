<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 대시보드 - 로그인</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>매출 대시보드</h1>
            <p class="subtitle">회사 매출 현황을 확인하세요</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember">
                        <span>로그인 상태 유지</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">로그인</button>
            </form>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script>
        // Supabase 설정
        var SUPABASE_URL = 'https://rmneisdjxjteysazzrhy.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtbmVpc2RqeGp0ZXlzYXp6cmh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNTk3MDYsImV4cCI6MjA4NTkzNTcwNn0.mACC4MRK_0Kpdr-iQyGT3LoLt-NiSDjXmNux_nWDWUs';
        var supabase = null;
        
        // CDN 동적 로드
        function loadSupabaseCDN() {
            return new Promise(function(resolve, reject) {
                var script = document.createElement('script');
                script.src = 'https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js';
                script.crossOrigin = 'anonymous';
                script.onload = function() { resolve(); };
                script.onerror = function() { reject(new Error('CDN load failed')); };
                document.head.appendChild(script);
            });
        }
        
        // Supabase 초기화
        loadSupabaseCDN().then(function() {
            if (window.supabase && window.supabase.createClient) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase 초기화 완료');
            }
        }).catch(function(err) {
            console.error('❌ Supabase CDN 로드 실패:', err);
        });
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
